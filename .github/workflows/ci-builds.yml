name: CI - Build Apps

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies (workspace)
        run: npm ci

      - name: Build database package
        working-directory: ./packages/database
        run: |
          npx prisma generate
          npm run build

      - name: Build API
        working-directory: ./apps/api
        run: npm run build

  build-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies (workspace)
        run: npm ci

      - name: Build Engine
        working-directory: ./apps/engine
        run: npm run build

