version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: wavo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minio_root
      MINIO_ROOT_PASSWORD: minio_password
    command: server /data
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:postgres_password@postgres:5432/wavo?schema=public
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: minio_root
      MINIO_SECRET_KEY: minio_password
      MINIO_USE_SSL: "false"
      JWT_PRIVATE_KEY: "wavo_secure_session_encryption_key_32_bytes_long_secret"
      JWT_PUBLIC_KEY: "wavo_secure_session_encryption_key_32_bytes_long_secret"
      ENCRYPTION_KEY: "wavo_secure_session_encryption_key_32_bytes_long_secret"
      NODE_ENV: production
      PORT: "4000"
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  wavo-frontend:
    container_name: wavo-frontend
    labels:
      - "project=wavo"
      - "component=frontend"
    build:
      context: ./apps/engine
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://api:4000
      NEXT_PUBLIC_WS_URL: ws://api:4000
      NODE_ENV: production
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  minio_data:
